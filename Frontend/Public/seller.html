<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard - ShopWave</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .tab-btn {
            padding: 0.75rem 1.5rem;
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            font-weight: 500;
            color: #6b7280;
        }

        .tab-btn.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="/" class="logo">ShopWave Seller</a>
            <ul class="nav-links">
                <li><a href="/" class="nav-link">Back to Shop</a></li>
                <li><a href="#" onclick="logout()" class="nav-link">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="container" style="margin-top: 3rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <div>
                <h2 class="section-title" style="margin-bottom: 0.5rem;">Dashboard</h2>
                <div style="font-weight: 500; color: #6b7280;">
                    Welcome, <span id="seller-name">Seller</span>
                </div>
            </div>
            <button onclick="showAddProductModal()" class="btn btn-primary">+ Add Product</button>
        </div>

        <!-- Tabs -->
        <div style="margin-bottom: 1.5rem; border-bottom: 1px solid #e5e7eb;">
            <button class="tab-btn active" onclick="switchTab('orders')">Orders</button>
            <button class="tab-btn" onclick="switchTab('products')">My Products</button>
        </div>

        <!-- Orders Tab -->
        <div id="orders-tab" class="tab-content active">
            <div class="card"
                style="background: white; padding: 1.5rem; border-radius: 0.5rem; border: 1px solid #e5e7eb;">
                <h3 style="margin-bottom: 1rem; font-size: 1.25rem;">Recent Orders</h3>
                <div style="overflow-x: auto;">
                    <table style="width: 100%; border-collapse: collapse; text-align: left;">
                        <thead>
                            <tr style="border-bottom: 2px solid #e5e7eb;">
                                <th style="padding: 0.75rem;">Order ID</th>
                                <th style="padding: 0.75rem;">Date</th>
                                <th style="padding: 0.75rem;">Product</th>
                                <th style="padding: 0.75rem;">Qty</th>
                                <th style="padding: 0.75rem;">Total</th>
                                <th style="padding: 0.75rem;">Customer</th>
                                <th style="padding: 0.75rem;">Address</th>
                                <th style="padding: 0.75rem;">Status</th>
                            </tr>
                        </thead>
                        <tbody id="orders-table-body">
                            <tr>
                                <td colspan="8" style="padding: 1rem; text-align: center;">Loading orders...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Products Tab -->
        <div id="products-tab" class="tab-content">
            <div class="card"
                style="background: white; padding: 1.5rem; border-radius: 0.5rem; border: 1px solid #e5e7eb;">
                <h3 style="margin-bottom: 1rem; font-size: 1.25rem;">My Products</h3>
                <div style="overflow-x: auto;">
                    <table style="width: 100%; border-collapse: collapse; text-align: left;">
                        <thead>
                            <tr style="border-bottom: 2px solid #e5e7eb;">
                                <th style="padding: 0.75rem;">Image</th>
                                <th style="padding: 0.75rem;">Name</th>
                                <th style="padding: 0.75rem;">Category</th>
                                <th style="padding: 0.75rem;">Price</th>
                                <th style="padding: 0.75rem;">Stock</th>
                                <th style="padding: 0.75rem;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="products-table-body">
                            <tr>
                                <td colspan="6" style="padding: 1rem; text-align: center;">Loading products...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Product Modal -->
    <div id="add-product-modal" class="hidden"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000;">
        <div class="card"
            style="background: white; padding: 2rem; border-radius: 0.5rem; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto;">
            <h3 style="margin-bottom: 1.5rem; text-align: center;">Add New Product</h3>

            <form id="add-product-form">
                <div class="form-group">
                    <label class="form-label">Product Name</label>
                    <input type="text" id="prod-name" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea id="prod-desc" class="form-input" rows="3"></textarea>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label class="form-label">Price ($)</label>
                        <input type="number" id="prod-price" class="form-input" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Stock Quantity</label>
                        <input type="number" id="prod-stock" class="form-input" required>
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label class="form-label">Brand</label>
                        <input type="text" id="prod-brand" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Category</label>
                        <select id="prod-category" class="form-input" required>
                            <option value="">Select...</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Image URL</label>
                    <input type="url" id="prod-image" class="form-input" placeholder="https://example.com/image.jpg">
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Add Product</button>
                    <button type="button" onclick="hideAddProductModal()" class="btn btn-outline"
                        style="flex: 1;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const seller = JSON.parse(localStorage.getItem('seller'));
        if (!seller) {
            window.location.href = 'seller-login.html';
        }

        document.getElementById('seller-name').textContent = seller.NAME || seller.USERNAME;

        // Load Data
        async function init() {
            loadSellerOrders();
            loadCategories();
            loadSellerProducts();
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            if (tabName === 'orders') {
                document.querySelector('button[onclick="switchTab(\'orders\')"]').classList.add('active');
                document.getElementById('orders-tab').classList.add('active');
            } else {
                document.querySelector('button[onclick="switchTab(\'products\')"]').classList.add('active');
                document.getElementById('products-tab').classList.add('active');
            }
        }

        async function loadSellerOrders() {
            try {
                const res = await fetch(`/api/sellers/${seller.SELLER_ID}/orders`);
                const orders = await res.json();
                renderOrders(orders);
            } catch (err) {
                console.error(err);
                document.getElementById('orders-table-body').innerHTML = '<tr><td colspan="8" style="padding: 1rem; text-align: center;">Failed to load orders.</td></tr>';
            }
        }

        function renderOrders(orders) {
            const tbody = document.getElementById('orders-table-body');
            if (orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="padding: 1rem; text-align: center;">No orders found for your products.</td></tr>';
                return;
            }

            tbody.innerHTML = orders.map(order => `
                <tr style="border-bottom: 1px solid #e5e7eb;">
                    <td style="padding: 0.75rem;">#${order.ORDER_ID}</td>
                    <td style="padding: 0.75rem;">${new Date(order.ORDER_DATE).toLocaleDateString()}</td>
                    <td style="padding: 0.75rem;">${order.PRODUCT_NAME}</td>
                    <td style="padding: 0.75rem;">${order.QUANTITY}</td>
                    <td style="padding: 0.75rem;">$${order.TOTAL_ITEM_PRICE.toFixed(2)}</td>
                    <td style="padding: 0.75rem;">${order.CUSTOMER_NAME}</td>
                    <td style="padding: 0.75rem; font-size: 0.875rem;">
                        ${order.SHIPPING_ADDRESS}
                        ${order.TRACKING_NUMBER ? `<br><small style="color: #2563eb;">${order.CARRIER}: ${order.TRACKING_NUMBER}</small>` : ''}
                    </td>
                    <td style="padding: 0.75rem;">
                        <select onchange="updateStatus(${order.ORDER_ID}, this.value)" style="padding: 0.25rem; border-radius: 0.25rem; border: 1px solid #d1d5db;">
                            <option value="Pending" ${order.ORDER_STATUS === 'Pending' ? 'selected' : ''}>Pending</option>
                            <option value="Shipped" ${order.ORDER_STATUS === 'Shipped' ? 'selected' : ''}>Shipped</option>
                            <option value="Delivered" ${order.ORDER_STATUS === 'Delivered' ? 'selected' : ''}>Delivered</option>
                            <option value="Cancelled" ${order.ORDER_STATUS === 'Cancelled' ? 'selected' : ''}>Cancelled</option>
                        </select>
                    </td>
                </tr>
            `).join('');
        }

        async function updateStatus(orderId, newStatus) {
            let body = { status: newStatus };

            if (newStatus === 'Shipped') {
                const carrier = prompt("Enter Carrier Name (e.g., FedEx, UPS):");
                if (!carrier) {
                    loadSellerOrders(); // Revert
                    return;
                }
                const trackingNumber = prompt("Enter Tracking Number:");
                if (!trackingNumber) {
                    loadSellerOrders(); // Revert
                    return;
                }
                body.carrier = carrier;
                body.tracking_number = trackingNumber;
            } else {
                if (!confirm(`Update order #${orderId} status to ${newStatus}?`)) {
                    loadSellerOrders(); // Revert selection
                    return;
                }
            }

            try {
                const res = await fetch(`/api/sellers/${seller.SELLER_ID}/orders/${orderId}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                if (res.ok) {
                    alert('Status updated!');
                    loadSellerOrders();
                } else {
                    alert('Failed to update status');
                }
            } catch (err) {
                console.error(err);
                alert('Failed to update status');
            }
        }

        async function loadSellerProducts() {
            console.log('Loading products for seller ID:', seller.SELLER_ID);
            if (!seller.SELLER_ID) {
                alert('Error: Seller ID is missing. Please logout and login again.');
                return;
            }

            try {
                const res = await fetch(`/api/sellers/${seller.SELLER_ID}/products`);
                if (!res.ok) {
                    const errData = await res.json();
                    throw new Error(errData.error || `Server error: ${res.status}`);
                }
                const products = await res.json();
                renderProducts(products);
            } catch (err) {
                console.error('Error loading products:', err);
                document.getElementById('products-table-body').innerHTML = `<tr><td colspan="6" style="padding: 1rem; text-align: center; color: red;">Failed to load products: ${err.message}</td></tr>`;
            }
        }

        function renderProducts(products) {
            const tbody = document.getElementById('products-table-body');
            if (products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="padding: 1rem; text-align: center;">You haven\'t listed any products yet.</td></tr>';
                return;
            }

            tbody.innerHTML = products.map(product => `
                <tr style="border-bottom: 1px solid #e5e7eb;">
                    <td style="padding: 0.75rem;">
                        <img src="${product.IMAGE_URL || 'https://via.placeholder.com/50'}" style="width: 50px; height: 50px; object-fit: cover; border-radius: 4px;">
                    </td>
                    <td style="padding: 0.75rem; font-weight: 500;">${product.NAME}</td>
                    <td style="padding: 0.75rem;">${product.CATEGORY_NAME}</td>
                    <td style="padding: 0.75rem;">$${product.PRICE.toFixed(2)}</td>
                    <td style="padding: 0.75rem;">
                        <input type="number" value="${product.STOCK_QUANTITY}" min="0" 
                            style="width: 60px; padding: 4px; border: 1px solid #d1d5db; border-radius: 4px;"
                            onchange="updateStock(${product.PRODUCT_ID}, this.value)">
                    </td>
                    <td style="padding: 0.75rem;">
                        <button onclick="deleteProduct(${product.PRODUCT_ID})" 
                            style="color: #ef4444; background: none; border: none; cursor: pointer; font-weight: 500;">
                            Delete
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        async function updateStock(productId, newStock) {
            try {
                const res = await fetch(`/api/products/${productId}/stock`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ stock_quantity: parseInt(newStock) })
                });

                if (res.ok) {
                    // Optional: show small toast
                } else {
                    alert('Failed to update stock');
                    loadSellerProducts(); // Revert
                }
            } catch (err) {
                console.error(err);
                alert('Failed to update stock');
            }
        }

        async function deleteProduct(productId) {
            if (!confirm('Are you sure you want to delete this product? This action cannot be undone.')) return;

            try {
                const res = await fetch(`/api/products/${productId}`, {
                    method: 'DELETE'
                });

                if (res.ok) {
                    alert('Product deleted successfully');
                    loadSellerProducts();
                } else {
                    const data = await res.json();
                    alert(data.error || 'Failed to delete product');
                }
            } catch (err) {
                console.error(err);
                alert('Failed to delete product');
            }
        }

        async function loadCategories() {
            try {
                const res = await fetch('/api/categories');
                const categories = await res.json();
                const select = document.getElementById('prod-category');
                categories.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat.CATEGORY_ID;
                    option.textContent = cat.NAME;
                    select.appendChild(option);
                });
            } catch (err) {
                console.error(err);
            }
        }

        // Modal Logic
        const modal = document.getElementById('add-product-modal');
        function showAddProductModal() {
            modal.classList.remove('hidden');
            modal.style.display = 'flex'; // Ensure flex display
        }
        function hideAddProductModal() {
            modal.classList.add('hidden');
            modal.style.display = 'none';
        }

        // Initial hide
        hideAddProductModal();

        // Add Product Form Submit
        document.getElementById('add-product-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const product = {
                name: document.getElementById('prod-name').value,
                description: document.getElementById('prod-desc').value,
                price: parseFloat(document.getElementById('prod-price').value),
                stock_quantity: parseInt(document.getElementById('prod-stock').value),
                brand: document.getElementById('prod-brand').value,
                category_id: document.getElementById('prod-category').value,
                seller_id: seller.SELLER_ID,
                image_url: document.getElementById('prod-image').value
            };

            try {
                const res = await fetch('/api/products', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(product)
                });

                if (res.ok) {
                    alert('Product added successfully!');
                    hideAddProductModal();
                    e.target.reset();
                    loadSellerProducts(); // Refresh list
                } else {
                    const data = await res.json();
                    alert(data.error || 'Failed to add product');
                }
            } catch (err) {
                console.error(err);
                alert('Failed to add product');
            }
        });

        function logout() {
            localStorage.removeItem('seller');
            window.location.href = 'seller-login.html';
        }

        init();
    </script>
</body>

</html>
