<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopWave | Modern E-Commerce</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="/" class="logo">ShopWave</a>
            <ul class="nav-links">
                <li><a href="/" class="nav-link">Home</a></li>
                <li><a href="about.html" class="nav-link">About Us</a></li>
                <li><a href="contact.html" class="nav-link">Contact Us</a></li>
                <li><a href="orders.html" class="nav-link">My Orders</a></li>
            </ul>
            <div class="nav-actions">
                <a href="cart.html" class="btn btn-outline">Cart <span id="cart-count">(0)</span></a>
                <div id="auth-buttons">
                    <a href="login.html" class="btn btn-primary">Login</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1>Discover the Extraordinary</h1>
            <p>Curated collection of premium products for your modern lifestyle.</p>
            <a href="#products" class="btn btn-primary" style="padding: 0.75rem 2rem; font-size: 1rem;">Shop Now</a>
        </div>
    </header>

    <main class="container" id="products">
        <h2 class="section-title">Featured Products</h2>
        <div class="product-grid" id="product-list">
            <!-- Products will be injected here by JS -->
            <div class="product-card skeleton">
                <div class="product-image"></div>
                <div class="product-info">
                    <div class="product-title">Loading...</div>
                </div>
            </div>
        </div>
        <footer style="background: #f9fafb; padding: 2rem 0; margin-top: 4rem; border-top: 1px solid #e5e7eb;">
            <div class="container" style="text-align: center; color: #6b7280; font-size: 0.875rem;">
                <p>&copy; 2025 ShopWave. All rights reserved.</p>
                <div style="margin-top: 1rem;">
                    <a href="seller-login.html" style="color: var(--primary-color); text-decoration: none;">Seller
                        Login</a>
                </div>
            </div>
        </footer>
    </main>

    <script src="app.js"></script>
</body>

</html>
