<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - ShopWave</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="/" class="logo">ShopWave</a>
            <ul class="nav-links">
                <li><a href="/" class="nav-link">Home</a></li>
                <li><a href="about.html" class="nav-link">About Us</a></li>
                <li><a href="contact.html" class="nav-link">Contact Us</a></li>
                <li><a href="orders.html" class="nav-link">My Orders</a></li>
            </ul>
        </div>
    </nav>

    <div class="container" style="margin-top: 3rem;">
        <h2 class="section-title">Checkout</h2>

        <div class="checkout-grid" style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem;">
            <!-- Left Column: Address & Payment -->
            <div>
                <!-- Address Section -->
                <div class="card"
                    style="background: white; padding: 1.5rem; border-radius: 0.5rem; border: 1px solid #e5e7eb; margin-bottom: 2rem;">
                    <h3 style="margin-bottom: 1rem; font-size: 1.25rem;">Shipping Address</h3>
                    <div id="address-list">
                        <p>Loading addresses...</p>
                    </div>
                    <button onclick="showAddressForm()" class="btn btn-outline" style="margin-top: 1rem;">+ Add New
                        Address</button>

                    <!-- Add Address Form (Hidden by default) -->
                    <div id="address-form" class="hidden"
                        style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #e5e7eb;">
                        <h4 style="margin-bottom: 1rem;">New Address</h4>
                        <form id="new-address-form">
                            <div class="form-group"><input type="text" id="addr-street" placeholder="Street Address"
                                    class="form-input" required></div>
                            <div class="form-group"><input type="text" id="addr-apt" placeholder="Apartment (Optional)"
                                    class="form-input"></div>
                            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
                                <div class="form-group"><input type="text" id="addr-city" placeholder="City"
                                        class="form-input" required></div>
                                <div class="form-group"><input type="text" id="addr-state" placeholder="State"
                                        class="form-input" required></div>
                                <div class="form-group"><input type="text" id="addr-pin" placeholder="Pincode"
                                        class="form-input" required></div>
                            </div>
                            <button type="submit" class="btn btn-primary">Save Address</button>
                            <button type="button" onclick="hideAddressForm()" class="btn btn-outline">Cancel</button>
                        </form>
                    </div>
                </div>

                <!-- Payment Section -->
                <div class="card"
                    style="background: white; padding: 1.5rem; border-radius: 0.5rem; border: 1px solid #e5e7eb;">
                    <h3 style="margin-bottom: 1rem; font-size: 1.25rem;">Payment Method</h3>
                    <div class="form-group">
                        <label style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem;">
                            <input type="radio" name="payment" value="Credit Card" checked
                                onchange="togglePaymentForms()"> Credit Card
                        </label>
                        <div id="cc-form" style="margin-left: 1.5rem; margin-bottom: 1rem;">
                            <input type="text" id="cc-number" class="form-input" placeholder="Card Number (16 digits)"
                                maxlength="16" style="margin-bottom: 0.5rem;">
                            <div style="display: flex; gap: 0.5rem;">
                                <input type="text" id="cc-expiry" class="form-input" placeholder="MM/YY" maxlength="5">
                                <input type="text" id="cc-cvv" class="form-input" placeholder="CVV" maxlength="3">
                            </div>
                        </div>

                        <label style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem;">
                            <input type="radio" name="payment" value="UPI" onchange="togglePaymentForms()"> UPI
                        </label>
                        <div id="upi-form" class="hidden" style="margin-left: 1.5rem; margin-bottom: 1rem;">
                            <input type="text" id="upi-id" class="form-input" placeholder="UPI ID (e.g. user@bank)">
                        </div>

                        <label style="display: flex; align-items: center; gap: 0.5rem;">
                            <input type="radio" name="payment" value="COD" onchange="togglePaymentForms()"> Cash on
                            Delivery
                        </label>
                    </div>
                </div>
            </div>

            <!-- Right Column: Order Summary -->
            <div>
                <div class="card"
                    style="background: white; padding: 1.5rem; border-radius: 0.5rem; border: 1px solid #e5e7eb; position: sticky; top: 6rem;">
                    <h3 style="margin-bottom: 1rem; font-size: 1.25rem;">Order Summary</h3>
                    <div id="order-summary">
                        <p>Loading summary...</p>
                    </div>
                    <div
                        style="border-top: 1px solid #e5e7eb; margin-top: 1rem; padding-top: 1rem; font-weight: 700; font-size: 1.25rem; display: flex; justify-content: space-between;">
                        <span>Total</span>
                        <span id="order-total">$0.00</span>
                    </div>
                    <button onclick="placeOrder()" class="btn btn-primary"
                        style="width: 100%; margin-top: 1.5rem; padding: 0.75rem;">Place Order</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) window.location.href = 'login.html';

        let addresses = [];
        let cartTotal = 0;

        // Load Data
        async function init() {
            await Promise.all([loadAddresses(), loadCartSummary()]);
        }

        async function loadAddresses() {
            try {
                const res = await fetch(`/api/addresses/${user.CUSTOMER_ID}`);
                addresses = await res.json();
                renderAddresses();
            } catch (err) {
                console.error(err);
            }
        }

        function renderAddresses() {
            const container = document.getElementById('address-list');
            if (addresses.length === 0) {
                container.innerHTML = '<p style="color: #6b7280;">No addresses found. Please add one.</p>';
                return;
            }

            container.innerHTML = addresses.map((addr, index) => `
                <label style="display: flex; align-items: start; gap: 0.75rem; padding: 0.75rem; border: 1px solid #e5e7eb; border-radius: 0.375rem; margin-bottom: 0.5rem; cursor: pointer;">
                    <input type="radio" name="address" value="${addr.ADDRESS_ID}" ${index === 0 ? 'checked' : ''} style="margin-top: 0.25rem;">
                    <div>
                        <div style="font-weight: 500;">${addr.STREET}</div>
                        <div style="font-size: 0.875rem; color: #6b7280;">${addr.APARTMENT ? addr.APARTMENT + ', ' : ''}${addr.CITY}, ${addr.STATE} - ${addr.PINCODE}</div>
                    </div>
                </label>
            `).join('');
        }

        async function loadCartSummary() {
            try {
                const res = await fetch(`/api/cart/${user.CUSTOMER_ID}`);
                const items = await res.json();

                const summaryContainer = document.getElementById('order-summary');
                cartTotal = items.reduce((acc, item) => acc + item.TOTAL_PRICE, 0);

                summaryContainer.innerHTML = items.map(item => `
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.875rem;">
                        <span>${item.NAME} (x${item.QUANTITY})</span>
                        <span>$${item.TOTAL_PRICE.toFixed(2)}</span>
                    </div>
                `).join('');

                document.getElementById('order-total').innerText = `$${cartTotal.toFixed(2)}`;
            } catch (err) {
                console.error(err);
            }
        }

        // Address Form Logic
        function showAddressForm() { document.getElementById('address-form').classList.remove('hidden'); }
        function hideAddressForm() { document.getElementById('address-form').classList.add('hidden'); }

        document.getElementById('new-address-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const address = {
                customer_id: user.CUSTOMER_ID,
                street: document.getElementById('addr-street').value,
                apartment: document.getElementById('addr-apt').value,
                city: document.getElementById('addr-city').value,
                state: document.getElementById('addr-state').value,
                pincode: document.getElementById('addr-pin').value
            };

            try {
                const res = await fetch('/api/addresses', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(address)
                });
                if (res.ok) {
                    hideAddressForm();
                    loadAddresses();
                    e.target.reset();
                } else {
                    alert('Failed to save address');
                }
            } catch (err) {
                console.error(err);
            }
        });

        // Payment Form Logic
        function togglePaymentForms() {
            const method = document.querySelector('input[name="payment"]:checked').value;
            document.getElementById('cc-form').classList.add('hidden');
            document.getElementById('upi-form').classList.add('hidden');

            if (method === 'Credit Card') {
                document.getElementById('cc-form').classList.remove('hidden');
            } else if (method === 'UPI') {
                document.getElementById('upi-form').classList.remove('hidden');
            }
        }

        // Place Order Logic
        async function placeOrder() {
            const selectedAddress = document.querySelector('input[name="address"]:checked');
            if (!selectedAddress) {
                alert('Please select a shipping address');
                return;
            }

            const paymentMethod = document.querySelector('input[name="payment"]:checked').value;
            let paymentDetails = {};

            if (paymentMethod === 'Credit Card') {
                const number = document.getElementById('cc-number').value;
                const expiry = document.getElementById('cc-expiry').value;
                const cvv = document.getElementById('cc-cvv').value;
                if (!number || !expiry || !cvv) {
                    alert('Please enter all card details');
                    return;
                }
                paymentDetails = { number, expiry, cvv };
            } else if (paymentMethod === 'UPI') {
                const upiId = document.getElementById('upi-id').value;
                if (!upiId) {
                    alert('Please enter UPI ID');
                    return;
                }
                paymentDetails = { upiId };
            }

            try {
                const res = await fetch('/api/orders/checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        customer_id: user.CUSTOMER_ID,
                        shipping_address_id: selectedAddress.value,
                        payment_method: paymentMethod,
                        payment_details: paymentDetails
                    })
                });

                const data = await res.json();
                if (res.ok) {
                    alert(`Order placed successfully! Order ID: ${data.orderId}`);
                    window.location.href = '/';
                } else {
                    alert(data.error || 'Checkout failed');
                }
            } catch (err) {
                console.error(err);
                alert('Checkout failed');
            }
        }

        init();
    </script>
</body>

</html>
