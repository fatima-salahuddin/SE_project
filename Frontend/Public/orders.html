<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - ShopWave</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="/" class="logo">ShopWave</a>
            <ul class="nav-links">
                <li><a href="/" class="nav-link">Home</a></li>
                <li><a href="about.html" class="nav-link">About Us</a></li>
                <li><a href="contact.html" class="nav-link">Contact Us</a></li>
                <li><a href="orders.html" class="nav-link" style="color: var(--primary-color);">My Orders</a></li>
            </ul>
            <div class="nav-actions">
                <a href="cart.html" class="btn btn-primary">Cart</a>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 3rem;">
        <h2 class="section-title">My Orders</h2>

        <div style="margin-bottom: 2rem;">
            <button onclick="filterOrders('All')" class="btn btn-outline" id="btn-all">All</button>
            <button onclick="filterOrders('Pending')" class="btn btn-outline" id="btn-pending">Placed (Pending)</button>
            <button onclick="filterOrders('Delivered')" class="btn btn-outline" id="btn-delivered">Delivered</button>
        </div>

        <div id="orders-list">
            <p>Loading orders...</p>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) window.location.href = 'login.html';

        let allOrders = [];

        async function loadOrders() {
            try {
                const res = await fetch(`/api/orders/${user.CUSTOMER_ID}`);
                allOrders = await res.json();
                renderOrders(allOrders);
                setActiveButton('All');
            } catch (err) {
                console.error(err);
                document.getElementById('orders-list').innerHTML = '<p>Failed to load orders.</p>';
            }
        }

        function renderOrders(orders) {
            const container = document.getElementById('orders-list');
            if (orders.length === 0) {
                container.innerHTML = '<p>No orders found.</p>';
                return;
            }

            container.innerHTML = orders.map(order => `
                <div class="card" style="background: white; padding: 1.5rem; border-radius: 0.5rem; border: 1px solid #e5e7eb; margin-bottom: 1rem;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                        <div>
                            <h3 style="font-size: 1.125rem; font-weight: 600;">Order #${order.ORDER_ID}</h3>
                            <p style="color: #6b7280; font-size: 0.875rem;">Placed on ${new Date(order.ORDER_DATE).toLocaleDateString()}</p>
                        </div>
                        <div style="text-align: right;">
                            <div style="font-weight: 700; font-size: 1.125rem;">$${order.TOTAL_AMOUNT.toFixed(2)}</div>
                            <span style="padding: 0.25rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; 
                                background: ${order.STATUS === 'Delivered' ? '#d1fae5' : '#fef3c7'}; 
                                color: ${order.STATUS === 'Delivered' ? '#065f46' : '#92400e'};">
                                ${order.STATUS}
                            </span>
                        </div>
                    </div>
                    <!-- We could fetch items here if needed, but for now just showing order summary -->
                </div>
            `).join('');
        }

        function filterOrders(status) {
            setActiveButton(status);
            if (status === 'All') {
                renderOrders(allOrders);
            } else {
                const filtered = allOrders.filter(o => o.STATUS === status);
                renderOrders(filtered);
            }
        }

        function setActiveButton(status) {
            ['All', 'Pending', 'Delivered'].forEach(s => {
                const btn = document.getElementById(`btn-${s.toLowerCase()}`);
                if (btn) {
                    if (s === status) {
                        btn.classList.remove('btn-outline');
                        btn.classList.add('btn-primary');
                    } else {
                        btn.classList.add('btn-outline');
                        btn.classList.remove('btn-primary');
                    }
                }
            });
        }

        loadOrders();
    </script>
</body>

</html>
