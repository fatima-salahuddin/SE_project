<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - ShopWave</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="/" class="logo">ShopWave</a>
            <ul class="nav-links">
                <li><a href="/" class="nav-link">Home</a></li>
                <li><a href="about.html" class="nav-link">About Us</a></li>
                <li><a href="contact.html" class="nav-link" style="color: var(--primary-color);">Contact Us</a></li>
                <li><a href="orders.html" class="nav-link">My Orders</a></li>
            </ul>
            <div class="nav-actions">
                <a href="cart.html" class="btn btn-outline">Cart <span id="cart-count">(0)</span></a>
                <div id="auth-buttons">
                    <a href="login.html" class="btn btn-primary">Login</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 4rem; max-width: 600px;">
        <h1 class="section-title">Contact Us</h1>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">
            Have questions? We'd love to hear from you. Send us a message and we'll respond as soon as possible.
        </p>

        <form class="form-container" style="margin: 0; max-width: 100%;">
            <div class="form-group">
                <label class="form-label">Name</label>
                <input type="text" class="form-input" placeholder="Your Name" required>
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" class="form-input" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Message</label>
                <textarea class="form-input" rows="5" placeholder="How can we help?" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
        </form>

        <div style="margin-top: 3rem; text-align: center; color: var(--text-secondary);">
            <p><strong>Email:</strong> support@shopwave.com</p>
            <p><strong>Phone:</strong> +1 (555) 123-4567</p>
            <p><strong>Address:</strong> 123 Commerce St, Market City, ST 12345</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
