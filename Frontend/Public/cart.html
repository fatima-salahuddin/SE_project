<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - ShopWave</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="/" class="logo">ShopWave</a>
            <ul class="nav-links">
                <li><a href="/" class="nav-link">Home</a></li>
                <li><a href="about.html" class="nav-link">About Us</a></li>
                <li><a href="contact.html" class="nav-link">Contact Us</a></li>
                <li><a href="orders.html" class="nav-link">My Orders</a></li>
            </ul>
            <div class="nav-actions">
                <a href="cart.html" class="btn btn-primary">Cart <span id="cart-count">(0)</span></a>
                <div id="auth-buttons">
                    <a href="login.html" class="btn btn-primary">Login</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 3rem;">
        <h2 class="section-title">Your Cart</h2>

        <div id="cart-items">
            <!-- Cart items injected here -->
            <p>Loading cart...</p>
        </div>

        <div class="cart-total" id="cart-total">
            Total: $0.00
        </div>

        <div style="text-align: right; margin-top: 2rem;">
            <button onclick="checkout()" class="btn btn-primary"
                style="padding: 0.75rem 2rem; font-size: 1.125rem;">Checkout</button>
        </div>
    </div>

    <script>
        const cartItemsContainer = document.getElementById('cart-items');
        const cartTotalElement = document.getElementById('cart-total');
        const user = JSON.parse(localStorage.getItem('user'));

        if (!user) {
            window.location.href = 'login.html';
        }

        async function loadCart() {
            try {
                const res = await fetch(`/api/cart/${user.CUSTOMER_ID}`);
                const items = await res.json();
                renderCart(items);
            } catch (err) {
                console.error(err);
                cartItemsContainer.innerHTML = '<p>Failed to load cart.</p>';
            }
        }

        function renderCart(items) {
            if (items.length === 0) {
                cartItemsContainer.innerHTML = '<p>Your cart is empty.</p>';
                cartTotalElement.innerText = 'Total: $0.00';
                return;
            }

            let total = 0;
            cartItemsContainer.innerHTML = items.map(item => {
                total += item.TOTAL_PRICE;
                return `
                    <div class="cart-item">
                        <img src="https://via.placeholder.com/100" alt="${item.NAME}">
                        <div class="cart-details">
                            <h3 style="font-size: 1.125rem; font-weight: 600;">${item.NAME}</h3>
                            <p style="color: var(--text-secondary);">$${item.PRICE.toFixed(2)} x ${item.QUANTITY}</p>
                        </div>
                        <div style="text-align: right;">
                            <div style="font-weight: 700; font-size: 1.125rem;">$${item.TOTAL_PRICE.toFixed(2)}</div>
                            <button onclick="removeItem(${item.CART_ID})" class="btn btn-outline" style="margin-top: 0.5rem; padding: 0.25rem 0.5rem; font-size: 0.75rem; color: #ef4444; border-color: #ef4444;">Remove</button>
                        </div>
                    </div>
                `;
            }).join('');

            cartTotalElement.innerText = `Total: $${total.toFixed(2)}`;
        }

        async function removeItem(cartId) {
            if (!confirm('Remove this item?')) return;
            try {
                await fetch(`/api/cart/${cartId}`, { method: 'DELETE' });
                loadCart();
            } catch (err) {
                console.error(err);
            }
        }

        function checkout() {
            window.location.href = 'checkout.html';
        }

        loadCart();
    </script>
</body>

</html>
